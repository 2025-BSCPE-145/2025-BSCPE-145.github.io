<!DOCTYPE html>
<html>
<head>
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="show('home')">

<nav>
  <button onclick="show('home')">Home</button>
  <button onclick="show('projects')">Projects</button>
  <button onclick="show('articles')">Articles</button>
</nav>

<section id="home" class="active">
  <h1>Welcome</h1>
</section>

<section id="projects">
  <h1>Projects</h1>
  <button onclick="openModal('p1')">Open Project</button>
</section>

<section id="articles">
  <h1>Articles</h1>
  <button onclick="openModal('a1')">Article 1</button>
  <button onclick="openModal('a2')">Article 2</button>
</section>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);">
  <div style="background:white; margin:10% auto; padding:20px; width:80%;">
    <button onclick="closeModal()">Close</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
