<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Noor Fatima</title>
<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; overflow-x:hidden; }
/* Floating Navbar */
.navbar {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15,23,42,0.7);
  backdrop-filter: blur(10px);
  padding: 10px 20px;
  border-radius: 50px;
  display:flex;
  gap:15px;
}
.navbar a { color:white; text-decoration:none; }
.navbar a:hover { color:#38bdf8; }
.toggle-btn { background:none; border:none; color:white; cursor:pointer; }
/* Animated Background */
body::before {
  content:"";
  position:fixed;
  width:150%; height:150%;
  background: radial-gradient(circle,#38bdf8 1px,transparent 1px);
  background-size:40px 40px;
  animation: move 15s linear infinite;
  z-index:-1;
}
@keyframes move {
  0% { transform:translate(0,0); }
  100% { transform:translate(-40px,-40px); }
}
section { padding:120px 10%; text-align:center; }
.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  display:inline-block;
  margin:20px;
  width:250px;
  transition:0.3s;
}
.card:hover { transform:translateY(-10px); box-shadow:0 0 20px #38bdf8; }
/* Typing Animation */
.typing {
  border-right:2px solid white;
  width:0;
  overflow:hidden;
  white-space:nowrap;
  animation: typing 4s steps(30,end) forwards, blink 0.7s infinite;
}
@keyframes typing { from { width:0 } to { width:100% } }
@keyframes blink { 50% { border-color:transparent } }
.light { background:white; color:black; }
.light .card { background:#f1f5f9; }
</style>
</head>
<body>
<div class="navbar">
<a href="#">Home</a>
<a href="#topics">Topics</a>
<button onclick="toggleMode()" class="toggle-btn">🌙</button>
</div>
<section>
<h1 class="typing">Welcome 😊😊</h1>
</section>
<section id="topics">
<h2>Learning Topics</h2>
<div class="card" data-aos="fade-up">
<h3>💻 Programming</h3>
<a href="programming.html">Read</a>
</div>
<div class="card" data-aos="zoom-in">
<h3>🐍 Python</h3>
<a href="python.html">Read</a>
</div>
<div class="card" data-aos="flip-left">
<h3>🗄️ Database</h3>
<a href="database.html">Read</a>
</div>
</section>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
function toggleMode(){ document.body.classList.toggle("light"); }
</script>
</body>
</html>
