<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Noor Fatima | Engineering Portfolio</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

header {
  text-align: center;
  padding: 30px;
}

nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

nav button {
  padding: 8px 14px;
  border: 1px solid #333;
  background: transparent;
  color: white;
  cursor: pointer;
}

section {
  display: none;
  padding: 30px;
  max-width: 900px;
  margin: auto;
}

section.active {
  display: block;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
}

/* LIST ITEMS */
.item {
  padding: 12px;
  margin: 10px 0;
  background: rgba(255,255,255,0.07);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.item:hover {
  background: rgba(56,189,248,0.2);
}

/* DETAIL VIEW */
.detail {
  display: none;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
}

.back {
  margin-bottom: 15px;
  cursor: pointer;
  color: #38bdf8;
}
</style>
</head>

<body>

<header>
  <h1>Noor Fatima</h1>
  <p>Engineering Student Portfolio</p>
</header>

<nav>
  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('projects')">Projects</button>
  <button onclick="showSection('articles')">Articles</button>
  <button onclick="showSection('contact')">Contact</button>
</nav>

<main>

<!-- HOME -->
<section id="home" class="active">
  <div class="card">
    <h2>Welcome 👋</h2>
    <p>Professional engineering portfolio.</p>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects">

  <!-- LIST VIEW -->
  <div id="projectList">

    <h2>Projects 💼</h2>

    <div class="item" onclick="openProject('p1')">
      🌐 Portfolio Website
    </div>

    <div class="item" onclick="openProject('p2')">
      💻 Programming Labs
    </div>

    <div class="item" onclick="openProject('p3')">
      📊 Database Project
    </div>

  </div>

  <!-- DETAIL VIEW -->
  <div id="projectDetail" class="detail"></div>

</section>

<!-- ARTICLES -->
<section id="articles">

  <!-- LIST -->
  <div id="articleList">

    <h2>Articles 📝</h2>

    <div class="item" onclick="openArticle('a1')">
      📊 Database Systems
    </div>

    <div class="item" onclick="openArticle('a2')">
      💻 Programming Fundamentals
    </div>

  </div>

  <!-- DETAIL -->
  <div id="articleDetail" class="detail"></div>

</section>

<!-- CONTACT -->
<section id="contact">
  <div class="card">
    <h2>Contact 📞</h2>
    <p>Email: NoorFatima45@example.com</p>
  </div>
</section>

</main>

<script>
function showSection(id){
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* PROJECT DATA */
function openProject(id){
  document.getElementById("projectList").style.display = "none";
  let box = document.getElementById("projectDetail");
  box.style.display = "block";

  if(id === "p1"){
    box.innerHTML = `
      <div class="back" onclick="backProjects()">← Back</div>
      <h2>🌐 Portfolio Website</h2>
      <p>Responsive website built using HTML, CSS, JS.</p>
    `;
  }

  if(id === "p2"){
    box.innerHTML = `
      <div class="back" onclick="backProjects()">← Back</div>
      <h2>💻 Programming Labs</h2>
      <p>Python loops, functions, and logic building exercises.</p>
    `;
  }

  if(id === "p3"){
    box.innerHTML = `
      <div class="back" onclick="backProjects()">← Back</div>
      <h2>📊 Database Project</h2>
      <p>SQL-based student record management system.</p>
    `;
  }
}

function backProjects(){
  document.getElementById("projectList").style.display = "block";
  document.getElementById("projectDetail").style.display = "none";
}

/* ARTICLE DATA */
function openArticle(id){
  document.getElementById("articleList").style.display = "none";
  let box = document.getElementById("articleDetail");
  box.style.display = "block";

  if(id === "a1"){
    box.innerHTML = `
      <div class="back" onclick="backArticles()">← Back</div>
      <h2>📊 Database Systems</h2>
      <p>Database systems manage structured data efficiently in applications.</p>
    `;
  }

  if(id === "a2"){
    box.innerHTML = `
      <div class="back" onclick="backArticles()">← Back</div>
      <h2>💻 Programming Fundamentals</h2>
      <p>Core concepts like loops, functions, and variables.</p>
    `;
  }
}

function backArticles(){
  document.getElementById("articleList").style.display = "block";
  document.getElementById("articleDetail").style.display = "none";
}
</script>

</body>
</html>
