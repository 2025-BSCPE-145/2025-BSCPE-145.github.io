<!DOCTYPE html>

<header class="navbar">

<section class="section">
  <h2>🌐 GitHub Website Hosting Guide</h2>

  <p>
    GitHub Pages allows you to host static websites for free.
  </p>

  <h3>Steps:</h3>
  <ul>
    <li>Create GitHub repository</li>
    <li>Upload HTML/CSS files</li>
    <li>Enable GitHub Pages in settings</li>
    <li>Get live website link</li>
  </ul>

  <p>Example link format:</p>
  <code>https://username.github.io/repository-name/</code>
</section>
