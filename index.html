<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noor Fatima | Ultra GOD MODE Portfolio</title>

  <meta name="description" content="Noor Fatima - Engineering Student & Frontend Developer Portfolio" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#020617;
      --panel:rgba(255,255,255,0.05);
      --text:#e5e7eb;
      --accent:#60a5fa;
    }

    [data-theme="light"]{
      --bg:#f8fafc;
      --panel:rgba(0,0,0,0.05);
      --text:#0f172a;
      --accent:#2563eb;
    }

    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background: radial-gradient(circle at var(--x,50%) var(--y,50%), var(--bg), #000);
      color:var(--text);
      overflow-x:hidden;
      transition:0.4s;
    }

    #progress{
      position:fixed;
      top:0;
      left:0;
      height:3px;
      background:var(--accent);
      width:0%;
      z-index:9999;
    }

    .cursor{
      position:fixed;
      width:14px;
      height:14px;
      border-radius:50%;
      background:var(--accent);
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:999;
    }

    canvas{
      position:fixed;
      inset:0;
      z-index:0;
      opacity:0.2;
    }

    nav{
      position:fixed;
      top:0;
      width:100%;
      padding:14px 8%;
      backdrop-filter: blur(18px);
      background:rgba(15,23,42,0.6);
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:1000;
    }

    nav ul{display:flex;gap:16px;list-style:none;font-size:14px;}
    nav ul li{cursor:pointer;opacity:0.8;}
    nav ul li:hover{opacity:1;}

    section{
      padding:100px 10%;
      min-height:100vh;
      position:relative;
      z-index:2;
    }

    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .hero h2{
      font-size:56px;
      background:linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .card{
      background:var(--panel);
      padding:20px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.08);
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover{transform:scale(1.03);}

    .badge{font-size:12px;opacity:0.7;margin-top:5px;}

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.7);
      z-index:2000;
    }

    .modal-content{
      background:var(--bg);
      padding:30px;
      border-radius:16px;
      max-width:600px;
      width:90%;
    }

    .active{opacity:1;}
  </style>
</head>
<body>

<div id="progress"></div>
<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<nav>
  <h3>Noor Fatima.dev</h3>
  <ul>
    <li onclick="go('home')">Home</li>
    <li onclick="go('projects')">Projects</li>
    <li onclick="go('labs')">Lab Reports</li>
    <li onclick="go('work')">Work</li>
    <li onclick="go('github')">GitHub</li>
  </ul>
</nav>

<section id="home" class="hero">
  <h2>Noor Fatima</h2>
  <p>Engineering Student • Frontend Developer • UI Engineer</p>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="grid" id="projectGrid"></div>
</section>

<section id="labs">
  <h2>Lab Reports</h2>
  <div class="grid" id="labGrid"></div>
</section>

<section id="work">
  <h2>Work (Offline / Academic Projects)</h2>
  <div class="grid" id="workGrid"></div>
</section>

<section id="github">
  <h2>GitHub Projects</h2>
  <div class="grid" id="githubGrid"></div>
</section>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2 id="mTitle"></h2>
    <p id="mDesc"></p>
  </div>
</div>

<script>

function go(id){
  document.querySelectorAll('section').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});

window.addEventListener('scroll',()=>{
  const h=document.documentElement;
  const scrolled=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;
  document.getElementById('progress').style.width=scrolled+'%';
});

const projects=[
  {t:"Portfolio UI",d:"Advanced UI system"},
  {t:"Blog Engine",d:"Static blog system"}
];

document.getElementById('projectGrid').innerHTML=
projects.map(p=>`
<div class='card' onclick="openModal('Project','${p.t}: ${p.d}')">
<h3>${p.t}</h3><div class='badge'>Click</div>
</div>`).join('');

const labs=[
  {t:"Physics Lab",d:"Motion analysis report"},
  {t:"Electrical Lab",d:"Ohm’s Law experiment"}
];

document.getElementById('labGrid').innerHTML=
labs.map(l=>`
<div class='card' onclick="openModal('Lab Report','${l.t}: ${l.d}')">
<h3>${l.t}</h3><div class='badge'>View</div>
</div>`).join('');

const work=[
  {t:"C++ Practice",d:"Console-based algorithms"},
  {t:"HTML UI Clones",d:"Static frontend practice"},
  {t:"Engineering Notes",d:"Offline academic work"}
];

document.getElementById('workGrid').innerHTML=
work.map(w=>`
<div class='card' onclick="openModal('Work','${w.t}: ${w.d}')">
<h3>${w.t}</h3><div class='badge'>Offline</div>
</div>`).join('');

function openModal(t,d){
  document.getElementById('mTitle').innerText=t;
  document.getElementById('mDesc').innerText=d;
  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

async function loadGitHub(user){
  try{
    const res=await fetch(`https://api.github.com/users/${user}/repos`);
    const data=await res.json();

    document.getElementById('githubGrid').innerHTML=
    data.slice(0,6).map(r=>`
      <div class='card'>
        <h3>${r.name}</h3>
        <div class='badge'>⭐ ${r.stargazers_count}</div>
        <p>${r.description||''}</p>
      </div>
    `).join('');
  }catch(e){
    document.getElementById('githubGrid').innerHTML="Failed to load";
  }
}

loadGitHub('YOUR_GITHUB_USERNAME');

const c=document.getElementById('bg');
const ctx=c.getContext('2d');
c.width=window.innerWidth;
c.height=window.innerHeight;

let dots=Array.from({length:40},()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  vx:(Math.random()-0.5),
  vy:(Math.random()-0.5)
}));

function animate(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle='rgba(96,165,250,0.3)';

  dots.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;
    if(d.x<0||d.x>c.width)d.vx*=-1;
    if(d.y<0||d.y>c.height)d.vy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

// default show home
['projects','labs','work','github'].forEach(id=>document.getElementById(id).style.display='none');

</script>

</body>
</html>
