<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noori | Developer Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#020617;
      --panel:rgba(255,255,255,0.05);
      --text:#e5e7eb;
      --accent:#60a5fa;
    }

    [data-theme="light"]{
      --bg:#f8fafc;
      --panel:rgba(0,0,0,0.05);
      --text:#0f172a;
      --accent:#2563eb;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background: radial-gradient(circle at var(--x,50%) var(--y,50%), var(--bg), #000);
      color:var(--text);
      overflow-x:hidden;
      transition:0.4s;
      min-height:100vh;
    }

    /* LOADER */
    .loader{
      position:fixed;
      inset:0;
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    .spinner{
      width:40px;
      height:40px;
      border:3px solid rgba(255,255,255,0.2);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    /* CURSOR */
    .cursor-glow{
      position:fixed;
      width:250px;
      height:250px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(96,165,250,0.25), transparent 60%);
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:0;
    }

    a{color:inherit;text-decoration:none;}

    nav{
      position:fixed;
      top:0;
      width:100%;
      padding:16px 8%;
      backdrop-filter: blur(16px);
      background: rgba(15, 23, 42, 0.6);
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:1000;
    }

    nav ul{
      display:flex;
      gap:18px;
      list-style:none;
      font-size:14px;
    }

    .toggle{
      cursor:pointer;
      padding:6px 10px;
      border-radius:8px;
      background:var(--panel);
    }

    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:0 20px;
      position:relative;
    }

    .hero h2{
      font-size:54px;
      background:linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:float 4s ease-in-out infinite;
    }

    @keyframes float{50%{transform:translateY(-10px)}}

    section{
      padding:90px 10%;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .card{
      background:var(--panel);
      padding:20px;
      border-radius:16px;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.08);
    }

    .card:hover{
      transform:translateY(-6px);
    }

    .badge{
      font-size:12px;
      opacity:0.7;
    }

    .hidden{opacity:0;transform:translateY(30px);transition:0.6s;}
    .show{opacity:1;transform:translateY(0);}
  </style>
</head>
<body>

<div class="loader" id="loader"><div class="spinner"></div></div>
<div class="cursor-glow" id="glow"></div>

<nav>
  <h1>Noori.dev</h1>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#github">GitHub</a></li>
  </ul>
  <div class="toggle" onclick="toggleTheme()">Theme</div>
</nav>

<section class="hero" id="home">
  <h2>Noor Fatima</h2>
  <p>Engineering Student • Frontend Developer • UI Engineer</p>
</section>

<section id="projects" class="hidden">
  <h2>Local Projects</h2>
  <div class="grid" id="localProjects"></div>
</section>

<section id="github" class="hidden">
  <h2>GitHub Live Projects</h2>
  <div class="grid" id="githubGrid"></div>
</section>

<script>

// loader
window.addEventListener('load',()=>{
  document.getElementById('loader').style.display='none';
});

// cursor glow
document.addEventListener('mousemove',(e)=>{
  const glow=document.getElementById('glow');
  glow.style.left=e.clientX+'px';
  glow.style.top=e.clientY+'px';
  document.body.style.setProperty('--x',e.clientX+'px');
  document.body.style.setProperty('--y',e.clientY+'px');
});

// theme
function toggleTheme(){
  document.body.dataset.theme = document.body.dataset.theme==='light'?'dark':'light';
}

// scroll animation
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('show')});
});
document.querySelectorAll('.hidden').forEach(el=>obs.observe(el));

// local projects
const localProjects=[
  {name:"Portfolio UI",desc:"Modern animated portfolio",tech:"HTML CSS JS"},
  {name:"Blog UI",desc:"Card based blog system",tech:"Frontend"}
];

const local=document.getElementById('localProjects');
local.innerHTML=localProjects.map(p=>`
<div class='card'>
  <h3>${p.name}</h3>
  <div class='badge'>${p.tech}</div>
  <p>${p.desc}</p>
</div>`).join('');

// GitHub API projects (LIVE)
async function loadGitHub(user){
  try{
    const res=await fetch(`https://api.github.com/users/${user}/repos`);
    const data=await res.json();

    document.getElementById('githubGrid').innerHTML=data.map(r=>`
      <div class='card'>
        <h3>${r.name}</h3>
        <div class='badge'>⭐ ${r.stargazers_count} • 🍴 ${r.forks_count}</div>
        <p>${r.description||'No description'}</p>
        <a href='${r.html_url}' target='_blank'>View Repo →</a>
      </div>
    `).join('');

  }catch(e){console.log(e)}
}

loadGitHub('your-github-username');

</script>

</body>
</html>
